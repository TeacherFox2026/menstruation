<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#6ee7b7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="蛇蛇月經紀錄本">
    
    <title>蛇蛇月經紀錄本</title>
    
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22%E8%9B%87%E8%9B%87%E6%9C%88%E7%B6%93%E7%B4%80%E9%8C%84%E6%9C%AC%22%2C%22short_name%22%3A%22%E8%9B%87%E8%9B%87%E7%B4%80%E9%8C%84%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23e8f5e9%22%2C%22theme_color%22%3A%22%236ee7b7%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Bcharset%3Dutf8%2C%253Csvg%2520xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%2520viewBox%3D%270%200%20100%20100%27%253E%253Ctext%2520y%3D%27.9em%27%2520font-size%3D%2790%27%253E%25F0%259F%2590%258D%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22192x192%20512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body {
            font-family: 'M PLUS Rounded 1c', 'Nunito', sans-serif;
            background-color: #e8f5e9;
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        .book-shadow { box-shadow: 4px 4px 0 0 #34d399; }
        .book-shadow-sm { box-shadow: 2px 2px 0 0 #6ee7b7; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #6ee7b7; border-radius: 10px; }
        
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .modal-animate { animation: popIn 0.2s ease-out forwards; }
        
        @keyframes float { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-6px) rotate(5deg); } 100% { transform: translateY(0px) rotate(0deg); } }
        .floating { animation: float 3.5s ease-in-out infinite; }

        @keyframes slideDown { 0% { transform: translateY(-100%); opacity: 0; } 10% { transform: translateY(0); opacity: 1; } 90% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100%); opacity: 0; } }
        .toast-animate { animation: slideDown 5.5s ease-in-out forwards; }

        .slide-left { animation: slideLeftAnim 0.35s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .slide-right { animation: slideRightAnim 0.35s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes slideLeftAnim { 0% { opacity: 0; transform: translateX(30px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes slideRightAnim { 0% { opacity: 0; transform: translateX(-30px); } 100% { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="flex justify-center text-gray-800">

    <div id="toast" class="fixed top-safe left-0 right-0 z-[100] flex justify-center pointer-events-none hidden mt-4">
        <div class="bg-white border-4 border-emerald-400 rounded-3xl p-3 px-5 shadow-[0_4px_15px_rgba(0,0,0,0.1)] flex items-center gap-3 max-w-[90%] book-shadow-sm">
            <span id="toastIcon" class="text-3xl floating">🐍</span>
            <p id="toastText" class="text-emerald-800 font-extrabold text-lg sm:text-xl leading-snug tracking-wide"></p>
        </div>
    </div>

    <div class="w-full max-w-md bg-[#fdfbf7] min-h-[100dvh] flex flex-col border-x-4 border-emerald-400 shadow-2xl relative">
        
        <div class="absolute top-3 left-3 text-2xl floating opacity-80 z-20 pointer-events-none">🌿</div>
        <div class="absolute top-10 right-3 text-xl floating opacity-70 z-20 pointer-events-none" style="animation-delay: 1.5s;">🍃</div>

        <div class="sticky top-0 z-40 bg-[#fdfbf7]">
            <header class="bg-[#6ee7b7] text-emerald-900 p-3 pt-safe rounded-b-[2rem] book-shadow shrink-0 relative border-b-4 border-emerald-500">
                <div class="flex justify-between items-center mb-3 pl-4 pt-2">
                    <h1 class="text-xl sm:text-2xl font-extrabold flex items-center gap-1.5 tracking-wide text-[#064e3b] truncate">
                        <span class="text-2xl shrink-0">🐍</span>
                        <span class="truncate">蛇蛇月經紀錄本</span>
                    </h1>
                    <div class="flex gap-2 relative z-30 shrink-0">
                        <button id="installBtn" onclick="installApp()" class="hidden w-auto px-3 h-9 bg-pink-100 rounded-full items-center justify-center hover:bg-pink-200 transition text-pink-700 font-extrabold active:scale-90 border-2 border-pink-300 shadow-sm gap-1 text-sm">
                            <i class="fa-solid fa-download"></i> 安裝
                        </button>
                        <button onclick="openDataModal()" class="w-9 h-9 bg-white/70 rounded-full flex items-center justify-center hover:bg-white transition text-emerald-800 active:scale-90 border-2 border-emerald-300 shadow-sm">
                            <i class="fa-solid fa-folder-open"></i>
                        </button>
                        <button onclick="openStatsModal()" class="w-9 h-9 bg-white/70 rounded-full flex items-center justify-center hover:bg-white transition text-emerald-800 active:scale-90 border-2 border-emerald-300 shadow-sm">
                            <i class="fa-solid fa-chart-bar"></i>
                        </button>
                    </div>
                </div>
                
                <div class="flex justify-between items-center bg-white rounded-full p-1 border-4 border-emerald-400 shadow-sm relative z-30">
                    <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center hover:bg-emerald-100 rounded-full transition active:scale-90 text-emerald-700">
                        <i class="fa-solid fa-caret-left text-2xl"></i>
                    </button>
                    <span id="monthDisplay" class="text-lg font-extrabold tracking-wider text-emerald-900">2024年 5月</span>
                    <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center hover:bg-emerald-100 rounded-full transition active:scale-90 text-emerald-700">
                        <i class="fa-solid fa-caret-right text-2xl"></i>
                    </button>
                </div>
            </header>
        </div>

        <div class="p-3 shrink-0 z-0">
            <div id="calendarContainer" class="bg-white border-4 border-emerald-400 rounded-3xl p-2 book-shadow-sm relative">
                <div class="grid grid-cols-7 gap-1 mb-1.5">
                    <div class="text-center font-extrabold text-emerald-700 text-sm">一</div>
                    <div class="text-center font-extrabold text-emerald-700 text-sm">二</div>
                    <div class="text-center font-extrabold text-emerald-700 text-sm">三</div>
                    <div class="text-center font-extrabold text-emerald-700 text-sm">四</div>
                    <div class="text-center font-extrabold text-emerald-700 text-sm">五</div>
                    <div class="text-center font-extrabold text-pink-400 text-sm">六</div>
                    <div class="text-center font-extrabold text-pink-500 text-sm">日</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-x-1 gap-y-1.5"></div>
                
                <div id="cycleSummary" class="mt-2 text-center text-xs sm:text-sm font-extrabold text-emerald-800 bg-[#f0fdf4] rounded-xl py-1.5 border-[3px] border-dashed border-emerald-300">
                </div>
            </div>
        </div>

        <div class="flex-1 bg-[#f0fdf4] p-4 rounded-t-[2.5rem] border-t-4 border-x-4 border-emerald-400 flex flex-col shadow-[0_-4px_10px_rgba(0,0,0,0.05)] mx-[-4px]">
            <h2 class="text-lg font-extrabold text-emerald-900 mb-3 flex items-center gap-2 shrink-0">
                <span class="bg-emerald-200 w-8 h-8 rounded-full flex items-center justify-center text-sm shadow-sm">📖</span>
                蛇蛇小本本 <span class="text-sm text-emerald-600 font-bold ml-1">(完整週期)</span>
            </h2>
            
            <div id="recordList" class="space-y-3 pr-1"></div>

            <div class="mt-auto pt-10 pb-6 text-right flex items-center justify-end gap-1.5">
                <span class="text-[11px] sm:text-xs font-extrabold text-emerald-600/50 tracking-wider">Made by TeacherFox</span>
                <span class="text-lg opacity-70">🦊</span>
            </div>
        </div>

    </div>

    <!-- === 彈出視窗：資料管理 === -->
    <div id="dataModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden flex-col items-center justify-center p-4">
        <div class="bg-white w-full max-w-[280px] rounded-[2.5rem] border-4 border-emerald-400 book-shadow p-6 modal-animate relative text-center">
            <div class="absolute -top-7 left-1/2 -translate-x-1/2 text-5xl floating">📦</div>
            <h3 class="text-xl font-extrabold text-emerald-900 mb-4 mt-4">資料管理</h3>
            <input type="file" id="importFileReal" accept=".json" class="hidden" onchange="handleImport(event)">
            <div class="space-y-3">
                <button onclick="document.getElementById('importFileReal').click(); closeDataModal();" class="w-full py-3.5 bg-emerald-50 text-emerald-800 font-extrabold rounded-2xl border-b-4 border-emerald-200 active:translate-y-1 active:border-b-0 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-file-import text-lg"></i> 匯入舊備份
                </button>
                <button onclick="handleExport(); closeDataModal();" class="w-full py-3.5 bg-emerald-400 text-white font-extrabold rounded-2xl border-b-4 border-emerald-600 active:translate-y-1 active:border-b-0 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-file-export text-lg"></i> 匯出新備份
                </button>
                <button onclick="closeDataModal()" class="w-full py-3 bg-gray-100 text-gray-500 font-extrabold rounded-2xl border-b-4 border-gray-300 active:translate-y-1 active:border-b-0 transition-all mt-4">
                    取消
                </button>
            </div>
        </div>
    </div>

    <!-- === 彈出視窗：新增/編輯紀錄 === -->
    <div id="editModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4">
        <div class="bg-white w-full max-w-[340px] rounded-[2.5rem] border-4 border-emerald-500 book-shadow p-6 modal-animate relative">
            <div class="absolute -top-7 left-1/2 -translate-x-1/2 text-5xl floating">🐍</div>
            
            <div class="flex justify-between items-center mb-4 border-b-4 border-emerald-100 pb-3 mt-4">
                <h3 id="modalDateTitle" class="text-xl font-extrabold text-emerald-900 tracking-wider"></h3>
                <button onclick="closeEditModal()" class="w-8 h-8 bg-emerald-100 rounded-full text-emerald-800 hover:bg-emerald-200 flex items-center justify-center font-bold border-2 border-emerald-200">✕</button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-extrabold text-emerald-800 mb-2">今天流血狀況？🌿</label>
                    <div class="grid grid-cols-6 gap-2" id="statusButtons">
                        <button onclick="selectStatus('light')" id="btn-light" class="status-btn py-2.5 rounded-2xl font-extrabold border-4 bg-gray-50 border-gray-200 text-gray-500 transition-transform active:scale-95 col-span-2 text-sm px-1">💧 量少</button>
                        <button onclick="selectStatus('normal')" id="btn-normal" class="status-btn py-2.5 rounded-2xl font-extrabold border-4 bg-gray-50 border-gray-200 text-gray-500 transition-transform active:scale-95 col-span-2 text-sm px-1">😊 正常</button>
                        <button onclick="selectStatus('heavy')" id="btn-heavy" class="status-btn py-2.5 rounded-2xl font-extrabold border-4 bg-gray-50 border-gray-200 text-gray-500 transition-transform active:scale-95 col-span-2 text-sm px-1">🌊 量多</button>
                        
                        <button onclick="selectStatus('special')" id="btn-special" class="status-btn py-2.5 rounded-xl font-extrabold border-4 bg-gray-50 border-gray-200 text-gray-500 transition-transform active:scale-95 col-span-3 text-[13px] sm:text-sm mt-1">🩸 特殊 (有月經)</button>
                        <button onclick="selectStatus('special_no_flow')" id="btn-special_no_flow" class="status-btn py-2.5 rounded-xl font-extrabold border-4 bg-gray-50 border-gray-200 text-gray-500 transition-transform active:scale-95 col-span-3 text-[13px] sm:text-sm mt-1">⚠️ 特殊 (無月經)</button>
                    </div>
                </div>

                <div class="mt-2 p-3 bg-emerald-50 rounded-2xl border-[3px] border-emerald-200 flex justify-between items-center cursor-pointer active:scale-95 transition-transform" onclick="toggleMeds()">
                    <div class="flex items-center gap-2">
                        <span class="text-2xl">💊</span>
                        <span class="font-extrabold text-emerald-900 tracking-wide">今天乖乖吃藥了嗎？</span>
                    </div>
                    <div id="medsToggleBg" class="w-[3.25rem] h-7 bg-gray-300 rounded-full relative transition-colors duration-300 shadow-inner">
                        <div id="medsKnob" class="w-6 h-6 bg-white rounded-full absolute top-0.5 left-0.5 transition-transform duration-300 shadow-md"></div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-extrabold text-emerald-800 mb-2 mt-1">寫點什麼吧 (選填) ✏️</label>
                    <textarea id="noteInput" rows="2" placeholder="想吃甜的、肚子悶悶..." class="w-full bg-[#f8fafc] border-4 border-emerald-200 rounded-2xl p-3 text-gray-800 font-bold focus:outline-none focus:border-emerald-400 resize-none"></textarea>
                </div>

                <div class="flex gap-2 pt-1">
                    <button id="deleteBtn" onclick="openConfirmModal()" class="flex-1 flex justify-center items-center gap-1 py-3 bg-red-50 text-red-600 font-extrabold rounded-2xl border-b-4 border-red-300 active:translate-y-1 active:border-b-0 transition-all hidden">
                        🗑️ 刪除
                    </button>
                    <button onclick="saveRecord()" class="flex-[2] flex justify-center items-center gap-1 py-3 bg-emerald-400 text-white font-extrabold rounded-2xl border-b-4 border-emerald-600 active:translate-y-1 active:border-b-0 transition-all">
                        ✔️ 記下來了！
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- === 彈出視窗：刪除防呆確認 === -->
    <div id="confirmModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] hidden flex-col items-center justify-center p-4">
        <div class="bg-white w-full max-w-[300px] rounded-[2rem] border-4 border-red-400 book-shadow p-6 modal-animate relative text-center">
            <div class="absolute -top-7 left-1/2 -translate-x-1/2 text-5xl floating">🥺</div>
            <h3 class="text-xl font-extrabold text-red-600 mb-2 mt-4">溫馨提醒 🐍</h3>
            <p class="text-gray-700 font-bold mb-6 text-sm leading-relaxed">親愛的，確定要刪除這天的紀錄嗎？<br>擦掉的話就找不回來囉！</p>
            <div class="flex gap-2">
                <button onclick="closeConfirmModal()" class="flex-1 py-3 bg-gray-100 text-gray-600 font-extrabold rounded-2xl border-b-4 border-gray-300 active:translate-y-1 active:border-b-0 transition-all">取消</button>
                <button onclick="executeDelete()" class="flex-1 py-3 bg-red-400 text-white font-extrabold rounded-2xl border-b-4 border-red-600 active:translate-y-1 active:border-b-0 transition-all">確定刪除</button>
            </div>
        </div>
    </div>

    <!-- === 彈出視窗：給醫生的經期紀錄 === -->
    <div id="statsModal" class="fixed inset-0 z-50 hidden justify-center bg-black/60 backdrop-blur-sm">
        <div id="statsModalContent" class="w-full max-w-md bg-[#fdfbf7] h-[100dvh] overflow-y-auto flex flex-col shadow-2xl relative border-x-4 border-emerald-400 transform transition-transform duration-300 translate-y-full">
            
            <div class="sticky top-0 z-40 bg-[#fdfbf7]">
                <header class="bg-[#6ee7b7] text-emerald-900 p-3 pt-safe rounded-b-[2rem] book-shadow shrink-0 relative border-b-4 border-emerald-500">
                    <div class="flex justify-between items-center mb-1 pl-4 pt-2 pb-2">
                        <h3 class="text-xl sm:text-2xl font-extrabold flex items-center gap-2 text-[#064e3b]">
                            <span class="text-2xl shrink-0">🏥</span>
                            <span class="truncate">經期紀錄報表</span>
                        </h3>
                        <button onclick="closeStatsModal()" class="w-9 h-9 bg-white/70 rounded-full flex items-center justify-center hover:bg-white transition text-emerald-800 active:scale-90 border-2 border-emerald-300 shadow-sm shrink-0">
                            <i class="fa-solid fa-xmark text-lg"></i>
                        </button>
                    </div>
                </header>
            </div>
            
            <div class="p-4 flex flex-col shrink-0 z-0 gap-3">
                <div class="bg-white p-3 rounded-3xl border-4 border-emerald-300 book-shadow-sm">
                    <div class="flex items-center gap-2 mb-2">
                        <input type="date" id="startDate" class="flex-1 p-2 rounded-xl border-4 border-emerald-100 text-xs font-bold text-gray-700 focus:outline-none focus:border-emerald-400 bg-gray-50">
                        <span class="text-emerald-500 font-extrabold">~</span>
                        <input type="date" id="endDate" class="flex-1 p-2 rounded-xl border-4 border-emerald-100 text-xs font-bold text-gray-700 focus:outline-none focus:border-emerald-400 bg-gray-50">
                    </div>
                    <button onclick="renderStats()" class="w-full bg-emerald-400 text-white font-extrabold py-2 rounded-xl border-b-4 border-emerald-600 active:translate-y-1 active:border-b-0 transition-all flex justify-center items-center gap-2">
                        <i class="fa-solid fa-search"></i> 重新分析
                    </button>
                </div>

                <div id="statsSummaryBox" class="grid grid-cols-2 gap-3 hidden">
                    <div class="bg-rose-50 border-[3px] border-rose-200 rounded-2xl p-3 flex flex-col items-center shadow-sm">
                        <span class="text-xs font-extrabold text-rose-800 mb-1">🩸 月經週期</span>
                        <div class="text-xl font-extrabold text-rose-600"><span id="statsCycleCount">0</span> <span class="text-sm">次</span></div>
                    </div>
                    <div class="bg-emerald-50 border-[3px] border-emerald-200 rounded-2xl p-3 flex flex-col items-center shadow-sm">
                        <span class="text-xs font-extrabold text-emerald-800 mb-1">💊 服藥總天數</span>
                        <div class="text-xl font-extrabold text-emerald-600"><span id="statsMedsCount">0</span> <span class="text-sm">天</span></div>
                    </div>
                </div>

                <div id="chartContainer" class="bg-white p-3 rounded-3xl border-4 border-emerald-300 book-shadow-sm hidden h-48">
                    <canvas id="periodChart"></canvas>
                </div>
            </div>

            <!-- 下方清單分區：月經週期 / 一般備註 -->
            <div class="flex-1 bg-[#f0fdf4] p-4 rounded-t-[2.5rem] border-t-4 border-emerald-400 flex flex-col shadow-[0_-4px_10px_rgba(0,0,0,0.05)] mt-1">
                <div id="statsList" class="pb-safe pb-8"></div>
            </div>
        </div>
    </div>

    <!-- === 彈出視窗：統一的備註詳情 === -->
    <div id="specialNoteModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden flex-col items-center justify-center p-4">
        <div class="bg-white w-full max-w-[320px] rounded-[2.5rem] border-4 border-amber-400 book-shadow p-6 modal-animate relative">
            <div class="absolute -top-7 left-1/2 -translate-x-1/2 text-5xl floating" id="noteModalFloatIcon">📝</div>
            <div class="flex justify-between items-center mb-4 border-b-4 border-amber-100 pb-3 mt-4">
                <h3 class="text-xl font-extrabold text-amber-900 tracking-wider" id="noteModalTitle">備註詳情</h3>
                <button onclick="closeSpecialNoteModal()" class="w-8 h-8 bg-amber-100 rounded-full text-amber-800 hover:bg-amber-200 flex items-center justify-center font-bold border-2 border-amber-200">✕</button>
            </div>
            <div id="specialNoteContent" class="space-y-3 max-h-[40vh] overflow-y-auto pr-1"></div>
            <div class="mt-4 pt-2">
                <button onclick="closeSpecialNoteModal()" class="w-full flex justify-center items-center py-3 bg-amber-400 text-amber-950 font-extrabold rounded-2xl border-b-4 border-amber-600 active:translate-y-1 active:border-b-0 transition-all">了解！</button>
            </div>
        </div>
    </div>

    <script>
        const STATUS_OPTIONS = {
            light: { id: 'light', label: '量少', colorClass: 'bg-pink-100 border-pink-300 text-pink-700' },
            normal: { id: 'normal', label: '正常', colorClass: 'bg-rose-500 border-rose-700 text-white' },
            heavy: { id: 'heavy', label: '量多', colorClass: 'bg-[#881337] border-[#4c0519] text-white' },
            special: { id: 'special', label: '特殊(有)', colorClass: 'bg-orange-500 border-orange-700 text-white' }, 
            special_no_flow: { id: 'special_no_flow', label: '特殊(無)', colorClass: 'bg-amber-400 border-amber-600 text-amber-950' }
        };

        const nPrefix = ["嘶嘶～", "親愛的，", "老婆辛苦啦！", "摸摸頭～", "小蛇來報到！", "呼呼～", "寶貝，", "哎呀，", "嘿嘿，", "乖乖～", "我的小公主，", "老婆大人，", "抱抱～", "心肝寶貝，", "辛苦的寶貝，", "最愛的妳，", "哈囉老婆～", "仙女寶貝，", "親親老婆，"];

        const sSuffix = ["🥺", "🐍💦", "🏥", "🫂", "🚑", "💊", "😭", "🩹", "😰", "💧", "❤️‍🩹"];

        let currentDate = new Date();

        let editingDate = null;
        let currentStatus = null; 
        let currentTookMeds = false;

        let deferredPrompt;
        let touchStartX = 0, touchEndX = 0, touchStartY = 0, touchEndY = 0;

        function init() {
            const today = new Date();
            const sixMonthsAgo = new Date();
            sixMonthsAgo.setMonth(today.getMonth() - 6);
            document.getElementById('startDate').value = getFormatDate(sixMonthsAgo);
            const endOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            document.getElementById('endDate').value = getFormatDate(endOfMonth);
            renderAll();
            
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                const installBtn = document.getElementById('installBtn');
                installBtn.classList.remove('hidden');
                installBtn.classList.add('flex');
            });

            const calendarContainer = document.getElementById('calendarContainer');
            calendarContainer.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY;
            }, {passive: true});
            calendarContainer.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX; touchEndY = e.changedTouches[0].screenY;
                handleSwipe();
            }, {passive: true});
        }

        function handleSwipe() {
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 40) {
                if (deltaX > 0) changeMonth(-1); 
                else changeMonth(1); 
            }
        }

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') document.getElementById('installBtn').classList.add('hidden');
                    deferredPrompt = null;
                });
            }
        }

        function getFormatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }
        function getTodayStr() { return getFormatDate(new Date()); }

        function calculateAllCycles() {
            const dates = Object.keys(records).sort();
            const flowCycles = [];
            let currentCycle = null;

            for (const dateStr of dates) {
                const record = records[dateStr];
                if (!record.status || record.status === 'special_no_flow' || record.status === 'none') continue; 

                if (!currentCycle) {
                    currentCycle = { start: dateStr, end: dateStr, records: [dateStr] };
                } else {
                    const dateObj = new Date(dateStr);
                    const prevDateObj = new Date(currentCycle.end);
                    const diffDays = Math.ceil(Math.abs(dateObj - prevDateObj) / (1000 * 60 * 60 * 24));

                    if (diffDays <= 4) {
                        currentCycle.end = dateStr;
                        currentCycle.records.push(dateStr);
                    } else {
                        flowCycles.push(currentCycle);
                        currentCycle = { start: dateStr, end: dateStr, records: [dateStr] };
                    }
                }
            }
            if (currentCycle) flowCycles.push(currentCycle);

            const allGrouped = [];
            
            if (flowCycles.length === 0 || (dates.length > 0 && dates[0] < flowCycles[0].start)) {
                allGrouped.push({
                    start: null, end: null, duration: 0,
                    periodNotes: [], generalNotes: [],
                    hasSpecialPeriod: false, hasSpecialGeneral: false
                });
            }

            flowCycles.forEach(fc => {
                const sObj = new Date(fc.start);
                const eObj = new Date(fc.end);
                fc.duration = Math.ceil((eObj - sObj) / (1000 * 60 * 60 * 24)) + 1;
                fc.periodNotes = [];
                fc.generalNotes = [];
                fc.hasSpecialPeriod = false;
                fc.hasSpecialGeneral = false;
                allGrouped.push(fc);
            });

            dates.forEach(d => {
                const rec = records[d];
                const hasNote = rec.note && rec.note.trim() !== '';
                const hasMeds = !!rec.tookMeds;
                const isSpecial = rec.status === 'special';
                const isSpecialNoFlow = rec.status === 'special_no_flow';

                if (!hasNote && !hasMeds && !isSpecial && !isSpecialNoFlow) return; 

                let targetCycle = allGrouped.length > 0 ? allGrouped[allGrouped.length - 1] : null;
                for (let i = 0; i < allGrouped.length; i++) {
                    if (allGrouped[i].end && d <= allGrouped[i].end) {
                        targetCycle = allGrouped[i];
                        break;
                    }
                }

                if (targetCycle) {
                    if (targetCycle.start && d >= targetCycle.start && d <= targetCycle.end) {
                        targetCycle.periodNotes.push({ date: d, data: rec });
                        if (isSpecial) targetCycle.hasSpecialPeriod = true;
                    } else {
                        targetCycle.generalNotes.push({ date: d, data: rec });
                        if (isSpecialNoFlow) targetCycle.hasSpecialGeneral = true;
                    }
                }
            });

            return allGrouped;
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            isListExpanded = false;
            renderAll(delta);
        }

        function renderAll(delta = 0) {
            const allCycles = calculateAllCycles();
            renderCalendar(allCycles, delta);
            renderList();
        }

        function renderCalendar(allCycles, delta = 0) {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const viewStartStr = getFormatDate(new Date(year, month, 1));
            const viewEndStr = getFormatDate(new Date(year, month + 1, 0));

            document.getElementById('monthDisplay').innerText = `${year}年 ${month + 1}月`;
            
            const firstDayRaw = new Date(year, month, 1).getDay();
            const firstDay = firstDayRaw === 0 ? 6 : firstDayRaw - 1; 
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const calendarContainer = document.getElementById('calendarContainer');
            calendarContainer.classList.remove('slide-left', 'slide-right');
            void calendarContainer.offsetWidth; 
            if (delta > 0) calendarContainer.classList.add('slide-left');
            else if (delta < 0) calendarContainer.classList.add('slide-right');

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) { grid.innerHTML += `<div class="p-1"></div>`; }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateObj = new Date(year, month, day);
                const dateStr = getFormatDate(dateObj);
                const record = records[dateStr];
                const isToday = dateStr === getTodayStr();
                
                let btnClass = "relative h-[42px] sm:h-[48px] flex flex-col items-center justify-center rounded-[1rem] border-[3px] transition-transform active:scale-90 font-extrabold ";
                
                if (record && record.status && STATUS_OPTIONS[record.status]) {
                    btnClass += STATUS_OPTIONS[record.status].colorClass;
                } else {
                    btnClass += isToday ? "bg-white border-emerald-400 text-emerald-600 shadow-md" : "bg-emerald-50/50 border-transparent text-emerald-800 hover:bg-emerald-100";
                }
                
                let dotColor = 'bg-emerald-700'; 
                if (record && ['normal', 'heavy', 'special'].includes(record.status)) {
                    dotColor = 'bg-white shadow-[0_0_2px_rgba(0,0,0,0.6)]'; 
                } else if (record && record.status === 'special_no_flow') {
                    dotColor = 'bg-[#451a03] shadow-sm'; 
                }
                const dotHtml = (record && record.note && record.note.trim() !== '') ? `<span class="absolute bottom-[3px] w-1 h-1 rounded-full ${dotColor} opacity-95"></span>` : '';
                
                const medsHtml = (record && record.tookMeds) ? `<span class="absolute top-0 right-0 text-[8px] transform scale-75 origin-top-right drop-shadow-[0_0_2px_rgba(255,255,255,1)] z-20 opacity-95">💊</span>` : '';

                grid.innerHTML += `<button onclick="openEditModal('${dateStr}')" class="${btnClass}"><span class="z-10 text-[14px] sm:text-[15px] font-extrabold tracking-tighter leading-none mb-[3px]">${day}</span>${dotHtml}${medsHtml}</button>`;
            }

            const validCycles = allCycles.filter(c => c.start !== null && c.end >= viewStartStr && c.start <= viewEndStr);
            const summaryEl = document.getElementById('cycleSummary');
            if (validCycles.length > 0) {
                const latest = validCycles[validCycles.length - 1];
                const sFormat = latest.start.slice(5).replace('-', '/');
                const eFormat = latest.end.slice(5).replace('-', '/');
                const durationText = latest.duration > 0 ? `共 ${latest.duration} 天` : `無月經`;
                summaryEl.innerHTML = `🐍 當次紀錄：${sFormat} ~ ${eFormat} <span class="text-rose-500 ml-1">${durationText}</span>`;
            } else {
                summaryEl.innerHTML = `<span class="opacity-60">本月尚無月經紀錄 🥚</span>`;
            }
        }

        function renderList() {
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            const prefix = `${year}-${month}`;
            
            let recordsToDisplay = [];
            Object.keys(records).forEach(d => {
                if (d.startsWith(prefix) && records[d].note && records[d].note.trim() !== '') {
                    recordsToDisplay.push([d, records[d]]);
                }
            });
            recordsToDisplay.sort(([a], [b]) => a.localeCompare(b));

            const listContainer = document.getElementById('recordList');
            listContainer.innerHTML = '';

            if (recordsToDisplay.length === 0) {
                listContainer.innerHTML = `

                        這段期間沒有寫文字備註唷～<br/>吃藥紀錄會直接顯示在月曆上！
                    </div>
                `;
                return;
            }

            const displayCount = isListExpanded ? recordsToDisplay.length : 10;
            const slicedRecords = recordsToDisplay.slice(0, displayCount);

            slicedRecords.forEach(([date, data]) => {
                const statusInfo = (data.status && STATUS_OPTIONS[data.status])

                listContainer.innerHTML += `

                listContainer.innerHTML += `<button onclick="toggleListExpand()" class="w-full py-2.5 text-center text-emerald-700 font-extrabold bg-emerald-50 rounded-xl border-[3px] border-emerald-200 shadow-sm active:scale-95 transition-transform mt-2 text-sm"><i class="fa-solid fa-angle-down mr-1"></i> 翻開更多...</button>`;
            } else if (isListExpanded && recordsToDisplay.length > 10) {
                 listContainer.innerHTML += `<button onclick="toggleListExpand()" class="w-full py-2.5 text-center text-emerald-700 font-extrabold bg-emerald-50 rounded-xl border-[3px] border-emerald-200 shadow-sm active:scale-95 transition-transform mt-2 text-sm"><i class="fa-solid fa-angle-up mr-1"></i> 收起筆記</button>`;
            }
        }

        function toggleListExpand() { isListExpanded = !isListExpanded; renderAll(); }

        let toastTimeout;
        function showCustomToast(msg, icon = '🐍') {
            const toast = document.getElementById('toast');
            document.getElementById('toastIcon').innerText = icon;
            document.getElementById('toastText').innerText = msg;
            toast.classList.remove('hidden', 'toast-animate');
            void toast.offsetWidth; 
            toast.classList.add('toast-animate');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.add('hidden'); }, 5500);

            if(status === 'special' || status === 'special_no_flow') return sPrefix[Math.floor(Math.random()*sPrefix.length)] + sBody[Math.floor(Math.random()*sBody.length)] + sSuffix[Math.floor(Math.random()*sSuffix.length)];

            editingDate = dateStr;

            ['light', 'normal', 'heavy', 'special', 'special_no_flow'].forEach(id => {

        function renderStats() {
            const startStr = document.getElementById('startDate').value;
            const endStr = document.getElementById('endDate').value;
            const listContainer = document.getElementById('statsList');
            const chartContainer = document.getElementById('chartContainer');
            const summaryBox = document.getElementById('statsSummaryBox');

            if(!startStr || !endStr || startStr > endStr) {
                listContainer.innerHTML = `<div class="text-center py-4 text-red-500 font-extrabold">日期選錯囉！檢查一下 🙈</div>`; 
                chartContainer.classList.add('hidden'); summaryBox.classList.add('hidden');
                return;
            }

            let totalMedsCount = 0;
            Object.keys(records).forEach(d => {
                if(d >= startStr && d <= endStr && records[d].tookMeds) totalMedsCount++;
            });

            const allCycles = calculateAllCycles();
            
            currentDisplayCycles = allCycles.filter(c => {
                if (c.start === null) {
                    c.generalNotes = c.generalNotes.filter(n => n.date >= startStr && n.date <= endStr);
                    return c.generalNotes.length > 0;
                }
                return c.end >= startStr && c.start <= endStr;
            }).reverse();

            summaryBox.classList.remove('hidden');
            const realFlowCycles = currentDisplayCycles.filter(c => c.duration > 0).length;
            document.getElementById('statsCycleCount').innerText = realFlowCycles;
            document.getElementById('statsMedsCount').innerText = totalMedsCount;

            let html = '';

            if (currentDisplayCycles.length === 0) {
                chartContainer.classList.add('hidden');
                listContainer.innerHTML = `
                    <div class="text-center py-8 text-emerald-600 font-extrabold bg-white rounded-3xl border-4 border-dashed border-emerald-300 shadow-sm mt-4">
                        <span class="text-4xl mb-2 block opacity-80">🏥</span>這段時間沒有任何紀錄喔！<br><span class="text-sm text-emerald-500 font-bold mt-2 inline-block">上方可查看服藥總天數 💊</span>
                    </div>
                `; return;
            }

            const validChartCycles = [...currentDisplayCycles].reverse().filter(c => c.duration > 0);
            if(validChartCycles.length > 0) {
                chartContainer.classList.remove('hidden');
                const labels = validChartCycles.map(c => c.start.slice(5).replace('-', '/'));
                const chartData = validChartCycles.map(c => c.duration);

                const ctx = document.getElementById('periodChart').getContext('2d');
                if (window.periodChartInstance) window.periodChartInstance.destroy();
                window.periodChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '月經天數', data: chartData,
                            backgroundColor: chartData.map(d => d > 10 ? 'rgba(244, 63, 94, 0.85)' : 'rgba(52, 211, 153, 0.85)'),
                            borderColor: chartData.map(d => d > 10 ? 'rgba(225, 29, 72, 1)' : 'rgba(16, 185, 129, 1)'),
                            borderWidth: 2, borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            y: { beginAtZero: true, suggestedMax: Math.max(...chartData, 12), title: { display: true, text: '流血天數', font: { family: "'M PLUS Rounded 1c', 'Nunito', sans-serif", weight: 'bold' } }, grid: { color: (context) => context.tick.value === 10 ? 'rgba(244, 63, 94, 0.5)' : 'rgba(0,0,0,0.05)', lineWidth: (context) => context.tick.value === 10 ? 2 : 1 } },
                            x: { ticks: { font: { family: "'M PLUS Rounded 1c', 'Nunito', sans-serif", weight: 'bold' } } }
                        },
                        plugins: { legend: { display: false }, tooltip: { titleFont: { family: "'M PLUS Rounded 1c', 'Nunito', sans-serif" }, bodyFont: { family: "'M PLUS Rounded 1c', 'Nunito', sans-serif" }, callbacks: { label: (context) => context.raw > 10 ? `${context.raw} 天 (⚠️ 超過10天危險指標)` : `${context.raw} 天` } } }
                    }
                });
            } else {
                chartContainer.classList.add('hidden');
            }

            currentDisplayCycles.forEach((cycle, index) => {
                const sFormat = cycle.start ? cycle.start.replace(/-/g, '/') : '';
                const eFormat = cycle.end ? cycle.end.replace(/-/g, '/') : '';
                
                let buttonsHtml = '';
                
                if (cycle.periodNotes.length > 0) {
                    const icon = cycle.hasSpecialPeriod ? '⚠️' : '📝';
                    const btnClass = cycle.hasSpecialPeriod ? 'bg-rose-500 text-white hover:bg-rose-600 border-transparent' : 'bg-rose-100 text-rose-800 hover:bg-rose-200 border-rose-300 border-2';
                    buttonsHtml += `<button onclick="openNoteModal(${index}, 'period')" class="text-[11px] sm:text-xs ${btnClass} px-3 py-1.5 rounded-lg shadow-sm active:scale-95 transition-transform font-extrabold flex items-center gap-1">${icon} 經期備註</button>`;
                }
                
                if (cycle.generalNotes.length > 0) {
                    const icon = cycle.hasSpecialGeneral ? '⚠️' : '🍃';
                    const btnClass = cycle.hasSpecialGeneral ? 'bg-amber-400 text-amber-950 hover:bg-amber-500 border-transparent' : 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200 border-emerald-300 border-2';
                    buttonsHtml += `<button onclick="openNoteModal(${index}, 'general')" class="text-[11px] sm:text-xs ${btnClass} px-3 py-1.5 rounded-lg shadow-sm active:scale-95 transition-transform font-extrabold flex items-center gap-1">${icon} 一般備註</button>`;
                }

                const isDanger = cycle.duration > 10;
                const durationClass = isDanger ? "text-rose-600 bg-rose-100 border-rose-300" : "text-emerald-700 bg-emerald-50 border-emerald-200";

                if (cycle.start === null) {
                    html += `
                        <div class="bg-white border-[3px] border-emerald-100 rounded-2xl p-3 flex flex-col gap-2.5 shadow-sm hover:bg-gray-50 transition-colors mb-3">
                            <div class="flex justify-between items-center w-full">
                                <div class="font-extrabold text-emerald-900 text-[13px] sm:text-sm tracking-tight flex items-center">
                                    [ 區間無月經紀錄 ]
                                </div>
                            </div>
                            ${buttonsHtml ? `<div class="flex flex-wrap gap-2">${buttonsHtml}</div>` : ''}
                        </div>
                    `;
                } else {
                    html += `
                        <div class="bg-white border-[3px] ${isDanger ? 'border-rose-100' : 'border-emerald-100'} rounded-2xl p-3 flex flex-col gap-2.5 shadow-sm hover:bg-gray-50 transition-colors mb-3">
                            <div class="flex justify-between items-center w-full">
                                <div class="font-extrabold ${isDanger ? 'text-rose-900' : 'text-emerald-900'} text-[13px] sm:text-[14px] tracking-tighter sm:tracking-tight flex items-center">
                                    ${sFormat} <span class="text-gray-400 mx-1.5 font-normal">~</span> ${eFormat}
                                </div>
                                <div class="font-extrabold px-2.5 py-1 rounded-lg border-2 shrink-0 text-[11px] sm:text-[12px] ml-1 ${durationClass}">共 ${cycle.duration} 天</div>
                            </div>
                            ${buttonsHtml ? `<div class="flex flex-wrap gap-2">${buttonsHtml}</div>` : ''}
                        </div>
                    `;
                }
            });
            
            listContainer.innerHTML = html;
        }

        function openNoteModal(index, type) {
            const cycle = currentDisplayCycles[index];
            const contentDiv = document.getElementById('specialNoteContent');
            const titleEl = document.getElementById('noteModalTitle');
            const iconEl = document.getElementById('noteModalFloatIcon');
            
            let notes = type === 'period' ? cycle.periodNotes : cycle.generalNotes;
            
            if (type === 'period') {
                titleEl.innerText = '經期備註';
                iconEl.innerText = cycle.hasSpecialPeriod ? '⚠️' : '📝';
            } else {
                titleEl.innerText = '一般備註';
                iconEl.innerText = cycle.hasSpecialGeneral ? '⚠️' : '🍃';
            }
            
            notes.sort((a,b) => b.date.localeCompare(a.date));

            contentDiv.innerHTML = '';
            if (notes.length === 0) {
                contentDiv.innerHTML = `<div class="text-center py-5 text-amber-700 font-bold bg-amber-50 rounded-2xl border-2 border-dashed border-amber-200">沒有寫字唷 🍃</div>`;
            } else {
                notes.forEach(n => {
                    const isSpecial = n.data.status === 'special' || n.data.status === 'special_no_flow';
                    const stateLabel = isSpecial ? '特殊' : '一般';
                    const stateColor = isSpecial ? 'bg-amber-400 text-amber-950 border-transparent' : 'bg-emerald-100 text-emerald-800 border-emerald-300 border';
                    
                    const badge = `<span class="text-[10px] ${stateColor} px-2 py-0.5 rounded-md shadow-sm ml-1">${stateLabel}</span>`;
                    
                    // 【修正】：只保留膠囊圖示，並放置於標籤右方
                    const medsBadge = n.data.tookMeds ? `<span class="text-[13px] ml-1.5 drop-shadow-sm">💊</span>` : '';
                    
                    const bgClass = isSpecial ? 'border-amber-300 bg-amber-50' : 'border-emerald-200 bg-[#f8fafc]';
                    
                    const textContent = (n.data && n.data.note && n.data.note.trim() !== '') ? n.data.note : '<span class="text-gray-400 italic text-[11px]">(純標記，無文字)</span>';

                    contentDiv.innerHTML += `
                        <div class="${bgClass} border-[3px] rounded-2xl p-3">
                            <div class="text-xs font-extrabold text-emerald-900 mb-1.5 flex items-center flex-wrap gap-y-1">
                                📅 ${n.date.replace(/-/g, '/')} ${badge} ${medsBadge}
                            </div>
                            <div class="text-sm font-bold text-gray-800 whitespace-pre-wrap leading-relaxed">${textContent}</div>
                        </div>`;
                });
            }
            document.getElementById('specialNoteModal').style.display = 'flex';
        }

        function closeSpecialNoteModal() { document.getElementById('specialNoteModal').style.display = 'none'; }

        function handleExport() {
            if(Object.keys(records).length === 0) { showCustomToast('目前還沒有紀錄喔！', '❌'); return; }
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' })); 
            a.download = `snake_records_${getTodayStr().replace(/-/g, '')}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); 
            showCustomToast('已經幫你打包好備份囉！', '📦');
        }

        function handleImport(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(typeof data === 'object' && !Array.isArray(data)) {
                        records = data; saveToLocal(); renderAll(); showCustomToast('資料匯入成功！ 🐍🎉', '✨');
                    } else throw new Error();
                } catch (error) { showCustomToast('哎呀，檔案格式不對喔。', '❌'); }
            };
            reader.readAsText(file); event.target.value = '';
        }

        init();
    </script>
</body>
</html>

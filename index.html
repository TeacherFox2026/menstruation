<!DOCTYPE html>

    <!-- 引入 Tailwind CSS -->

    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'M PLUS Rounded 1c', 'Nunito', sans-serif;
            background-color: #e8f5e9;
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        .book-shadow { box-shadow: 4px 4px 0 0 #34d399; }
        .book-shadow-sm { box-shadow: 2px 2px 0 0 #6ee7b7; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #6ee7b7; border-radius: 10px; }
        
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-animate { animation: popIn 0.2s ease-out forwards; }
        
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .floating { animation: float 3.5s ease-in-out infinite; }

        @keyframes slideDown {
            0% { transform: translateY(-100%); opacity: 0; }
            10% { transform: translateY(0); opacity: 1; }
            90% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100%); opacity: 0; }
        }
        .toast-animate {
            animation: slideDown 3.5s ease-in-out forwards;
        }
    </style>
</head>
<body class="flex justify-center text-gray-800">

    <!-- === 彈出視窗：資料夾管理 (匯入/匯出) === -->

            <div class="p-4 flex justify-between items-center border-b-4 border-emerald-200 shrink-0 bg-white rounded-t-[2.2rem]">

    <div id="specialNoteModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden flex-col items-center justify-center p-4">

            <div class="flex justify-between items-center mb-4 border-b-4 border-amber-100 pb-3 mt-4">

                <button onclick="closeSpecialNoteModal()" class="w-full flex justify-center items-center py-3 bg-amber-400 text-amber-950 font-extrabold rounded-2xl border-b-4 border-amber-600 active:translate-y-1 active:border-b-0 transition-all">
                    了解！

    <script>
        const STATUS_OPTIONS = {
            light: { id: 'light', label: '量少', colorClass: 'bg-pink-100 border-pink-300 text-pink-700' },
            normal: { id: 'normal', label: '正常', colorClass: 'bg-rose-500 border-rose-700 text-white' },
            heavy: { id: 'heavy', label: '量多', colorClass: 'bg-[#881337] border-[#4c0519] text-white' },
            special: { id: 'special', label: '特殊', colorClass: 'bg-amber-400 border-amber-600 text-amber-950' }
        };

        const nPrefix = ["嘶嘶～", "親愛的，", "老婆辛苦啦！", "摸摸頭～", "小蛇來報到！", "呼呼～", "寶貝，", "哎呀，", "嘿嘿，", "乖乖～"];
        const nBody = ["喝點溫水暖暖肚子喔！", "今天也要把你寵上天！", "不舒服就盡情使喚老公吧！", "給你一個大大的擁抱！", "想吃什麼甜點？老公去買！", "肚子痛痛飛走囉！", "今天你是女王，什麼都不用做！", "多休息，別累壞了喔！", "不管量多量少，老公都愛你！", "小蛇為你施展魔法！"];
        const nSuffix = ["🐍💚", "✨", "🥰"];
        const sPrefix = ["哎呀！怎麼了？", "老婆沒事吧？", "小蛇很擔心捏...", "心疼老婆...", "怎麼會這樣～"];
        const sBody = ["有不舒服一定要跟我說喔！", "隨時待命帶你去看醫生！", "別怕，我一直都在你身邊！", "這幾天我會好好照顧你的！", "放下手邊的事休息好嗎？"];
        const sSuffix = ["🥺", "🐍💦", "🏥", "🫂"];

        let currentDate = new Date();
        let records = JSON.parse(localStorage.getItem('period_records')) || {};
        let editingDate = null;
        let currentStatus = null;
        let isListExpanded = false;
        let currentDisplayCycles = [];
        
        // PWA 原生安裝變數
        let deferredPrompt;

        function init() {
            const today = new Date();
            const sixMonthsAgo = new Date();
            sixMonthsAgo.setMonth(today.getMonth() - 6);
            document.getElementById('startDate').value = getFormatDate(sixMonthsAgo);
            const endOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            document.getElementById('endDate').value = getFormatDate(endOfMonth);
            renderAll();
            
            // 監聽 PWA 觸發安裝事件
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                const installBtn = document.getElementById('installBtn');
                installBtn.classList.remove('hidden');
                installBtn.classList.add('flex');
            });
        }

        // 觸發原生 APP 安裝機制
        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        document.getElementById('installBtn').classList.add('hidden');
                    }
                    deferredPrompt = null;
                });
            }
        }

        function getFormatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }
        function getTodayStr() { return getFormatDate(new Date()); }

        function calculateAllCycles() {
            const dates = Object.keys(records).sort();
            const cycles = [];
            let currentCycle = null;

            for (const dateStr of dates) {
                if (!currentCycle) {
                    currentCycle = { start: dateStr, end: dateStr, records: [dateStr] };
                } else {
                    const dateObj = new Date(dateStr);
                    const prevDateObj = new Date(currentCycle.end);
                    const diffDays = Math.ceil(Math.abs(dateObj - prevDateObj) / (1000 * 60 * 60 * 24));

                    if (diffDays <= 4) {
                        currentCycle.end = dateStr;
                        currentCycle.records.push(dateStr);
                    } else {
                        cycles.push(currentCycle);
                        currentCycle = { start: dateStr, end: dateStr, records: [dateStr] };
                    }
                }
            }
            if (currentCycle) cycles.push(currentCycle);

            cycles.forEach(c => {
                c.duration = c.records.length; 
                c.hasSpecial = false;
                c.notes = []; 
                c.records.forEach(d => { 
                    const record = records[d];
                    if(record.status === 'special') c.hasSpecial = true; 
                    if(record.note) {
                        c.notes.push({ date: d, text: record.note, status: record.status });
                    }
                });
            });
            return cycles;
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            isListExpanded = false;
            renderAll();
        }

        function renderAll() {
            const allCycles = calculateAllCycles();
            renderCalendar(allCycles);
            renderList(allCycles);
        }

        function renderCalendar(allCycles) {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const viewStartStr = getFormatDate(new Date(year, month, 1));
            const viewEndStr = getFormatDate(new Date(year, month + 1, 0));

            document.getElementById('monthDisplay').innerText = `${year}年 ${month + 1}月`;
            
            const firstDayRaw = new Date(year, month, 1).getDay();
            const firstDay = firstDayRaw === 0 ? 6 : firstDayRaw - 1; 
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="p-1"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateObj = new Date(year, month, day);
                const dateStr = getFormatDate(dateObj);
                const record = records[dateStr];
                const isToday = dateStr === getTodayStr();
                
                // 【月曆瘦身】：將高度強制固定，減少佔用空間
                let btnClass = "relative h-[42px] sm:h-[48px] flex flex-col items-center justify-center rounded-[1rem] border-[3px] transition-transform active:scale-90 font-extrabold ";
                
                if (record) {
                    btnClass += STATUS_OPTIONS[record.status].colorClass;
                } else {
                    btnClass += isToday ? "bg-white border-emerald-400 text-emerald-600 shadow-md" : "bg-emerald-50/50 border-transparent text-emerald-800 hover:bg-emerald-100";
                }
                const dotColor = (record && (record.status === 'heavy' || record.status === 'normal' || record.status === 'special')) ? 'bg-white' : 'bg-emerald-700';
                const dotHtml = (record && record.note) ? `<span class="absolute bottom-0.5 w-1.5 h-1.5 rounded-full ${dotColor} opacity-90 border border-black/10"></span>` : '';

                grid.innerHTML += `<button onclick="openEditModal('${dateStr}')" class="${btnClass}"><span class="z-10 text-sm sm:text-base">${day}</span>${dotHtml}</button>`;
            }

            const cyclesInView = allCycles.filter(c => c.end >= viewStartStr && c.start <= viewEndStr);
            const summaryEl = document.getElementById('cycleSummary');
            if (cyclesInView.length > 0) {
                const latest = cyclesInView[cyclesInView.length - 1];
                const sFormat = latest.start.slice(5).replace('-', '/');
                const eFormat = latest.end.slice(5).replace('-', '/');
                summaryEl.innerHTML = `🐍 當次月經統計：${sFormat} ~ ${eFormat} <span class="text-rose-500 ml-1">共 ${latest.duration} 天</span>`;
            } else {
                summaryEl.innerHTML = `<span class="opacity-60">本月尚無完整月經紀錄喔 🥚</span>`;
            }
        }

        function renderList(allCycles) {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const viewStartStr = getFormatDate(new Date(year, month, 1));
            const viewEndStr = getFormatDate(new Date(year, month + 1, 0));
            
            const cyclesInView = allCycles.filter(c => c.end >= viewStartStr && c.start <= viewEndStr);
            
            let recordsToDisplay = [];
            cyclesInView.forEach(c => {
                c.records.forEach(d => {
                    recordsToDisplay.push([d, records[d]]);
                });
            });
            recordsToDisplay.sort(([a], [b]) => a.localeCompare(b));

            const listContainer = document.getElementById('recordList');
            listContainer.innerHTML = '';

            if (recordsToDisplay.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-8 text-emerald-600 font-extrabold bg-white rounded-3xl border-4 border-dashed border-emerald-300 mt-2 flex flex-col items-center shadow-sm">
                        <span class="text-4xl mb-2 opacity-80">🥚</span>
                        這個月還空空的喔～<br/>蛇蛇在等妳寫日記！
                    </div>
                `;
                return;
            }

            const displayCount = isListExpanded ? recordsToDisplay.length : 10;
            const slicedRecords = recordsToDisplay.slice(0, displayCount);

            slicedRecords.forEach(([date, data]) => {
                const statusInfo = STATUS_OPTIONS[data.status];
                
                listContainer.innerHTML += `
                    <div onclick="openEditModal('${date}')" class="bg-white border-[3px] border-emerald-200 rounded-2xl p-3 flex items-start gap-3 book-shadow-sm cursor-pointer hover:-translate-y-1 transition-transform active:scale-[0.98]">
                        <div class="shrink-0 w-14 h-14 rounded-xl flex flex-col items-center justify-center border-4 ${statusInfo.colorClass}">
                            <span class="text-xs opacity-90 font-extrabold">${date.slice(5).replace('-', '/')}</span>
                            <span class="font-extrabold text-sm tracking-widest">${statusInfo.label}</span>
                        </div>
                        <div class="flex-1 py-1">
                            <p class="text-sm font-bold ${data.note ? 'text-gray-800' : 'text-gray-400'} break-words whitespace-pre-wrap leading-relaxed">${data.note || "（沒有寫備註唷 🍃）"}</p>
                        </div>
                    </div>
                `;
            });

            if (!isListExpanded && recordsToDisplay.length > 10) {
                listContainer.innerHTML += `
                    <button onclick="toggleListExpand()" class="w-full py-3 text-center text-emerald-700 font-extrabold bg-emerald-50 rounded-2xl border-4 border-emerald-200 shadow-sm active:scale-95 transition-transform mt-2">
                        <i class="fa-solid fa-angle-down mr-1"></i> 翻開更多...
                    </button>
                `;
            } else if (isListExpanded && recordsToDisplay.length > 10) {
                 listContainer.innerHTML += `
                    <button onclick="toggleListExpand()" class="w-full py-3 text-center text-emerald-700 font-extrabold bg-emerald-50 rounded-2xl border-4 border-emerald-200 shadow-sm active:scale-95 transition-transform mt-2">
                        <i class="fa-solid fa-angle-up mr-1"></i> 收起筆記
                    </button>
                `;
            }
        }

        function toggleListExpand() {
            isListExpanded = !isListExpanded;
            renderAll();
        }

        // 系統提示機制
        let toastTimeout;
        function showCustomToast(msg, icon = '🐍') {
            const toast = document.getElementById('toast');
            document.getElementById('toastIcon').innerText = icon;
            document.getElementById('toastText').innerText = msg;
            toast.classList.remove('hidden', 'toast-animate');
            void toast.offsetWidth; 
            toast.classList.add('toast-animate');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.add('hidden'); }, 3500);
        }

        function getFeedbackMessage(status) {
            if(status === 'special') return sPrefix[Math.floor(Math.random()*5)] + sBody[Math.floor(Math.random()*5)] + sSuffix[Math.floor(Math.random()*4)];
            return nPrefix[Math.floor(Math.random()*10)] + nBody[Math.floor(Math.random()*10)] + nSuffix[Math.floor(Math.random()*3)];
        }

        function openEditModal(dateStr) {
            editingDate = dateStr;
            const record = records[dateStr];
            document.getElementById('modalDateTitle').innerText = `${dateStr}`;
            document.getElementById('noteInput').value = record ? record.note : '';
            currentStatus = record ? record.status : 'normal';
            updateStatusButtonsUI();
            const deleteBtn = document.getElementById('deleteBtn');
            if (record) deleteBtn.classList.remove('hidden');
            else deleteBtn.classList.add('hidden');
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

        function selectStatus(statusId) {
            currentStatus = statusId;
            updateStatusButtonsUI();
            showCustomToast(getFeedbackMessage(statusId), '🐍');
        }

        function updateStatusButtonsUI() {
            ['light', 'normal', 'heavy', 'special'].forEach(id => {
                const btn = document.getElementById(`btn-${id}`);
                const info = STATUS_OPTIONS[id];
                if (id === currentStatus) {
                    btn.className = `status-btn py-3 rounded-2xl font-extrabold border-[4px] transition-transform active:scale-95 scale-105 shadow-lg ${info.colorClass}`;
                } else {
                    btn.className = `status-btn py-3 rounded-2xl font-extrabold border-4 bg-white border-gray-200 text-gray-400 transition-transform active:scale-95 hover:bg-gray-50`;
                }
            });
        }

        function saveRecord() {
            records[editingDate] = { status: currentStatus, note: document.getElementById('noteInput').value.trim() };
            saveToLocal(); closeEditModal(); renderAll(); 
            showCustomToast('已經幫你記下來囉！', '✔️');
        }

        // 資料夾視窗
        function openDataModal() {
            document.getElementById('dataModal').style.display = 'flex';
        }

        function closeDataModal() {
            document.getElementById('dataModal').style.display = 'none';
        }

        // 刪除防呆邏輯
        function openConfirmModal() {
            document.getElementById('confirmModal').style.display = 'flex';
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').style.display = 'none';
        }

        function executeDelete() {
            delete records[editingDate];
            saveToLocal(); 
            closeConfirmModal();
            closeEditModal(); 
            renderAll(); 
            showCustomToast('紀錄已經擦掉囉 🧽', '🗑️');
        }

        function saveToLocal() { localStorage.setItem('period_records', JSON.stringify(records)); }

        // 醫生報告與圖表
        function openStatsModal() {
            const modal = document.getElementById('statsModal');
            const content = document.getElementById('statsModalContent');
            modal.style.display = 'flex';
            setTimeout(() => { content.classList.remove('translate-y-full'); }, 10);
            renderStats();
        }

        function closeStatsModal() {
            const content = document.getElementById('statsModalContent');
            content.classList.add('translate-y-full');
            setTimeout(() => { document.getElementById('statsModal').style.display = 'none'; }, 300);
        }

        function renderStats() {
            const startStr = document.getElementById('startDate').value;
            const endStr = document.getElementById('endDate').value;
            const listContainer = document.getElementById('statsList');
            const chartContainer = document.getElementById('chartContainer');

            if(!startStr || !endStr || startStr > endStr) {
                listContainer.innerHTML = `<div class="text-center py-4 text-red-500 font-extrabold">日期選錯囉！檢查一下 🙈</div>`; 
                chartContainer.classList.add('hidden');
                return;
            }

            const allCycles = calculateAllCycles();
            currentDisplayCycles = allCycles.filter(c => c.end >= startStr && c.start <= endStr).reverse();

            listContainer.innerHTML = '';

            if (currentDisplayCycles.length === 0) {
                chartContainer.classList.add('hidden');
                listContainer.innerHTML = `
                    <div class="text-center py-10 text-emerald-600 font-extrabold bg-white rounded-3xl border-4 border-dashed border-emerald-300 shadow-sm">
                        <span class="text-4xl mb-2 block opacity-80">🏥</span>這段時間沒有紀錄喔！
                    </div>
                `; return;
            }

            chartContainer.classList.remove('hidden');
            const chartCycles = [...currentDisplayCycles].reverse();
            const labels = chartCycles.map(c => c.start.slice(5).replace('-', '/'));
            const chartData = chartCycles.map(c => c.duration);

            const ctx = document.getElementById('periodChart').getContext('2d');
            if (window.periodChartInstance) window.periodChartInstance.destroy();
            
            window.periodChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '月經天數',
                        data: chartData,
                        backgroundColor: chartData.map(d => d > 10 ? 'rgba(244, 63, 94, 0.85)' : 'rgba(52, 211, 153, 0.85)'),
                        borderColor: chartData.map(d => d > 10 ? 'rgba(225, 29, 72, 1)' : 'rgba(16, 185, 129, 1)'),
                        borderWidth: 2,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            suggestedMax: Math.max(...chartData, 12),
                            title: { display: true, text: '總天數', font: { family: "'M PLUS Rounded 1c', 'Nunito', sans-serif", weight: 'bold' } },
                            grid: {
                                color: (context) => context.tick.value === 10 ? 'rgba(244, 63, 94, 0.5)' : 'rgba(0,0,0,0.05)',
                                lineWidth: (context) => context.tick.value === 10 ? 2 : 1
                            }
                        },
                        x: { ticks: { font: { family: "'M PLUS Rounded 1c', 'Nunito', sans-serif", weight: 'bold' } } }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            titleFont: { family: "'M PLUS Rounded 1c', 'Nunito', sans-serif" },
                            bodyFont: { family: "'M PLUS Rounded 1c', 'Nunito', sans-serif" },
                            callbacks: {
                                label: (context) => context.raw > 10 ? `${context.raw} 天 (⚠️ 超過10天危險指標)` : `${context.raw} 天`
                            }
                        }
                    }
                }
            });

            currentDisplayCycles.forEach((cycle, index) => {
                const sFormat = cycle.start.replace(/-/g, '/');
                const eFormat = cycle.end.replace(/-/g, '/');
                const warnBadge = cycle.hasSpecial ? 
                    `<button onclick="openSpecialNoteModal(${index})" class="ml-1 text-[11px] bg-amber-400 text-amber-950 px-2 py-0.5 rounded-full shadow-sm align-middle hover:bg-amber-300 active:scale-90 transition-transform cursor-pointer font-extrabold inline-flex items-center">⚠️ 看備註</button>` : '';
                const isDanger = cycle.duration > 10;
                const durationClass = isDanger ? "text-rose-600 bg-rose-100 border-rose-300" : "text-emerald-700 bg-emerald-50 border-emerald-200";

                listContainer.innerHTML += `
                    <div class="bg-white border-[3px] ${isDanger ? 'border-rose-100' : 'border-emerald-100'} rounded-2xl p-3 flex justify-between items-center shadow-sm hover:bg-gray-50 transition-colors">
                        <div class="font-extrabold ${isDanger ? 'text-rose-900' : 'text-emerald-900'} text-sm sm:text-base tracking-tight flex items-center flex-wrap gap-y-1">
                            ${sFormat} <span class="text-gray-300 mx-0.5">~</span> ${eFormat}
                            ${warnBadge}
                        </div>
                        <div class="font-extrabold px-3 py-1.5 rounded-xl border-2 shrink-0 text-sm ml-2 ${durationClass}">
                            共 ${cycle.duration} 天
                        </div>
                    </div>
                `;
            });
        }

        // 特殊備註彈出邏輯
        function openSpecialNoteModal(index) {
            const cycle = currentDisplayCycles[index];
            const contentDiv = document.getElementById('specialNoteContent');
            contentDiv.innerHTML = '';

            if (cycle.notes.length === 0) {
                contentDiv.innerHTML = `<div class="text-center py-5 text-amber-700 font-bold bg-amber-50 rounded-2xl border-2 border-dashed border-amber-200">只有標示狀態，沒有寫字唷 🍃</div>`;
            } else {
                cycle.notes.forEach(note => {
                    const isSpecial = note.status === 'special';
                    const badge = isSpecial ? `<span class="text-[10px] bg-amber-400 text-amber-950 px-2 py-0.5 rounded-full ml-2 shadow-sm">特殊</span>` : '';
                    const borderClass = isSpecial ? 'border-amber-300 bg-amber-50' : 'border-gray-100 bg-[#f8fafc]';
                    
                    contentDiv.innerHTML += `
                        <div class="${borderClass} border-[3px] rounded-2xl p-3">
                            <div class="text-xs font-extrabold text-emerald-800 mb-1.5 flex items-center">
                                📅 ${note.date.replace(/-/g, '/')} ${badge}
                            </div>
                            <div class="text-sm font-bold text-gray-800 whitespace-pre-wrap leading-relaxed">${note.text}</div>
                        </div>
                    `;
                });
            }
            document.getElementById('specialNoteModal').style.display = 'flex';
        }

        function closeSpecialNoteModal() { document.getElementById('specialNoteModal').style.display = 'none'; }

        // 檔案處理與提示
        function handleExport() {
            if(Object.keys(records).length === 0) { 
                showCustomToast('目前還沒有紀錄喔！', '❌'); 
                return; 
            }
            const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `snake_records_${getTodayStr().replace(/-/g, '')}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            showCustomToast('已經幫你打包好備份囉！', '📦');
        }

        function handleImport(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(typeof data === 'object' && !Array.isArray(data)) {
                        records = data; saveToLocal(); renderAll(); 
                        showCustomToast('資料匯入成功！ 🐍🎉', '✨');
                    } else throw new Error();
                } catch (error) { 
                    showCustomToast('哎呀，檔案格式不對喔。', '❌'); 
                }
            };
            reader.readAsText(file); event.target.value = '';
        }

        init();
    </script>
</body>
</html>
